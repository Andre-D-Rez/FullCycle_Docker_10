version: '3.8'
services:
  db:
    image: postgres:13
    env_file: .env
    ports:
      - "5432:5432"
    networks:
      - bank-network
    restart: unless-stopped

  transaction-service:
    build: ./api-transacoes
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - bank-network
    restart: always

  query-service:
    build: ./servico-query
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - bank-network
    restart: always

networks:
  bank-network:
    driver: bridge